version: 2

project_name: briefme

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: briefme
    main: ./cmd/briefme
    binary: briefme
    env:
      - CGO_ENABLED=0   # modernc.org/sqlite is pure Go — no CGO needed
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - config.yaml.example
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^test:"
